<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>🏏 Cricket Analytics Dashboard</title>

<style>

body{
font-family:system-ui;
background:#050913;
color:white;
padding:30px
}

h1{font-size:40px}

.panel{
background:#0e1624;
padding:20px;
border-radius:12px;
margin-bottom:20px
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer
}

.primary{background:#d4a847;color:black}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
padding:8px;
border-bottom:1px solid #1e293b
}

th{color:#d4a847}

.card{
background:#111827;
padding:10px;
border-radius:8px
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px
}

</style>

</head>

<body>

<h1>🏏 Cricket Analytics Dashboard</h1>

<div class="panel">

<select id="feed">

<option value="recent">Recent</option>
<option value="live">Live</option>
<option value="upcoming">Upcoming</option>

</select>

<button class="primary" onclick="loadMatches()">Load Matches</button>

<select id="matchSelector"></select>

</div>

<div id="summary" class="panel grid"></div>

<div id="scorecard" class="panel"></div>

<div id="overs" class="panel"></div>

<pre id="json"></pre>

<script>

const API="https://YOUR-WORKER-URL.workers.dev/api"

let currentMatch=null

async function loadMatches(){

const res=await fetch(API+"/matches/v1/"+feed.value)

const data=await res.json()

const matches=[]

data.typeMatches.forEach(t=>{
t.seriesMatches.forEach(s=>{
s.seriesAdWrapper.matches.forEach(m=>{
matches.push(m.matchInfo)
})
})
})

matchSelector.innerHTML=""

matches.forEach(m=>{

const opt=document.createElement("option")

opt.value=m.matchId
opt.text=m.team1.teamName+" vs "+m.team2.teamName

matchSelector.appendChild(opt)

})

}

matchSelector.onchange=()=>loadMatch(matchSelector.value)

async function loadMatch(id){

const data=await fetch(API+"/mcenter/v1/"+id+"/hscard")
.then(r=>r.json())

currentMatch=data

renderSummary()
renderScorecard()

json.textContent=JSON.stringify(data,null,2)

}

function renderSummary(){

const h=currentMatch.matchHeader

summary.innerHTML=`

<div class="card">Status<br><b>${h.status}</b></div>

<div class="card">Fixture<br><b>${h.matchDescription}</b></div>

<div class="card">Venue<br><b>${h.venue.name}</b></div>

<div class="card">Series<br><b>${h.seriesName}</b></div>

`

}

function renderScorecard(){

const sc=currentMatch.scoreCard

scorecard.innerHTML=sc.map(i=>{

const bats=Object.values(i.batTeamDetails.batsmenData)

return`

<h3>${i.batTeamDetails.batTeamName}</h3>

<table>

<tr>

<th>Player</th>
<th>Runs</th>
<th>Balls</th>
<th>4</th>
<th>6</th>
<th>SR</th>

</tr>

${bats.map(b=>`

<tr>

<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
<td>${b.strikeRate}</td>

</tr>

`).join("")}

</table>

`

}).join("")

}

</script>

</body>
</html>
