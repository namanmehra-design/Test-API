<!DOCTYPE html>
<html>
<head>
    <title>CricViz Pro Match Dashboard</title>
    <style>
        body { background:#0b1220; color:white; font-family: 'DM Sans', sans-serif; margin:0; }
        header { padding:20px; font-size:24px; font-weight:bold; color:#ffc857; border-bottom: 1px solid #1b2644; display: flex; justify-content: space-between; }
        .container { display:flex; height:90vh; }
        .sidebar { width:320px; background:#111a2e; overflow-y:auto; padding:20px; border-right: 1px solid #1b2644; }
        .match { padding:15px; border-radius:10px; margin-bottom:12px; background:#1b2644; cursor:pointer; }
        .match.active { border: 2px solid #ffc857; }
        .main { flex:1; padding:25px; overflow:auto; }
        .stat-hi { color: #10B981; font-weight: bold; }
        .badge { background: #ffc857; color: #000; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #2a3554; text-align: left; }
        th { color: #888; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <span>🏏 CricViz Live Scorecard</span>
    <span id="globalStatus" style="font-size: 14px; color: #888;">Updating...</span>
</header>

<div class="container">
    <div class="sidebar" id="matchList">Loading...</div>
    <div class="main">
        <div id="motmDisplay"></div>
        <h2 id="matchTitle">Select a Match</h2>
        <div id="scorecardArea" style="display:none;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div><h3>Batting</h3><table id="batTable"></table></div>
                <div><h3>Bowling & Dots</h3><table id="bowlTable"></table></div>
            </div>
        </div>
    </div>
</div>

<script>
const WORKER = "https://cricbuzz.namanmehra.workers.dev";

async function api(path) {
    const r = await fetch(`${WORKER}?endpoint=${encodeURIComponent(path)}`);
    return await r.json();
}

async function init() {
    try {
        const data = await api("/matches/v1/live");
        let matches = [];
        data.typeMatches.forEach(t => t.seriesMatches?.forEach(s => s.seriesAdWrapper?.matches?.forEach(m => matches.push(m))));
        
        const listHtml = matches.map(m => `
            <div class="match" id="m${m.matchInfo.matchId}" onclick="loadScorecard(${m.matchInfo.matchId})">
                <b>${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</b><br>
                <small>${m.matchInfo.status}</small>
            </div>
        `).join('');
        document.getElementById("matchList").innerHTML = listHtml;

        // AUTO-POPULATE: Load the first match immediately
        if(matches.length > 0) loadScorecard(matches[0].matchInfo.matchId);
        document.getElementById("globalStatus").innerText = "Live Data Synced";

    } catch (e) { document.getElementById("matchList").innerText = "Error loading matches."; }
}

async function loadScorecard(id) {
    // UI Feedback
    document.querySelectorAll('.match').forEach(el => el.classList.remove('active'));
    document.getElementById(`m${id}`)?.classList.add('active');
    
    const data = await api(`/mcenter/v1/${id}/hscard`);
    document.getElementById("scorecardArea").style.display = "block";
    document.getElementById("matchTitle").innerText = data.matchHeader.matchDescription;

    // MOTM
    const motm = data.matchHeader.playersOfTheMatch?.[0]?.name || "Not Announced";
    document.getElementById("motmDisplay").innerHTML = `<div class="badge">MOTM: ${motm}</div>`;

    // Render Batting
    let batHtml = `<tr><th>Batsman</th><th>R</th><th>B</th><th>6s</th><th>SR</th></tr>`;
    Object.values(data.scoreCard[0].batTeamDetails.batsmenData).forEach(p => {
        batHtml += `<tr><td>${p.batName}</td><td class="stat-hi">${p.runs}</td><td>${p.balls}</td><td>${p.sixes}</td><td>${p.strikeRate}</td></tr>`;
    });
    document.getElementById("batTable").innerHTML = batHtml;

    // Render Bowling (Including Dots)
    let bowlHtml = `<tr><th>Bowler</th><th>O</th><th>W</th><th>Dots</th><th>Econ</th></tr>`;
    Object.values(data.scoreCard[0].bowTeamDetails.bowlersData).forEach(b => {
        bowlHtml += `<tr><td>${b.bowlerName}</td><td>${b.overs}</td><td class="stat-hi">${b.wickets}</td><td style="color:#ffc857">${b.dots || 0}</td><td>${b.economy}</td></tr>`;
    });
    document.getElementById("bowlTable").innerHTML = bowlHtml;
}

init();
</script>
</body>
</html>
