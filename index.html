<script>
const API_KEY = "6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095";
const API_HOST = "cricbuzz-cricket.p.rapidapi.com";

async function loadMatches() {
  const status = document.getElementById("status");
  const selector = document.getElementById("matchSelector");

  try {
    status.innerHTML = "Loading recent matches...";

    const res = await fetch("https://cricbuzz-cricket.p.rapidapi.com/matches/v1/recent", {
      headers: {
        "x-rapidapi-key": API_KEY,
        "x-rapidapi-host": API_HOST
      }
    });

    const data = await res.json();
    selector.innerHTML = "";

    (data.typeMatches || []).forEach(type => {
      (type.seriesMatches || []).forEach(series => {
        const matches = series.seriesAdWrapper?.matches || [];
        matches.forEach(match => {
          const info = match.matchInfo || {};
          const team1 = info.team1?.teamName || "Team 1";
          const team2 = info.team2?.teamName || "Team 2";
          const matchId = info.matchId;

          if (!matchId) return;

          const option = document.createElement("option");
          option.value = matchId;
          option.textContent = `${team1} vs ${team2}`;
          selector.appendChild(option);
        });
      });
    });

    status.innerHTML = "Matches loaded";
  } catch (err) {
    console.error(err);
    status.innerHTML = `Error loading matches: ${err.message}`;
  }
}

async function loadMatch() {
  const matchId = document.getElementById("matchSelector").value;
  const status = document.getElementById("status");

  try {
    status.innerHTML = "Fetching scorecard...";

    const res = await fetch(
      `https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${matchId}/hscard`,
      {
        headers: {
          "x-rapidapi-key": API_KEY,
          "x-rapidapi-host": API_HOST
        }
      }
    );

    const data = await res.json();
    console.log("Full response:", data);

    document.getElementById("results").style.display = "block";
    document.getElementById("raw").textContent = JSON.stringify(data, null, 2);

    const header = data.matchHeader || {};
    const venue = header.venue || {};

    document.getElementById("summary").innerHTML = `
      <p><b>Match:</b> ${header.matchDescription || "N/A"}</p>
      <p><b>Venue:</b> ${venue.name || "N/A"}${venue.city ? ", " + venue.city : ""}</p>
      <p><b>Status:</b> ${header.status || "N/A"}</p>
      <p><b>Toss:</b> ${header.tossResults?.tossWinnerName || "N/A"}</p>
    `;

    document.getElementById("meta").innerHTML = `
      <p><b>Format:</b> ${header.matchFormat || "N/A"}</p>
      <p><b>Series:</b> ${header.seriesName || "N/A"}</p>
      <p><b>State:</b> ${header.state || "N/A"}</p>
      <p><b>Complete:</b> ${header.complete ? "Yes" : "No"}</p>
    `;

    const innings = data.scoreCard?.[0] || {};
    const batsmen = innings.batsman || [];
    const bowlers = innings.bowler || [];

    const batBody = document.querySelector("#batTable tbody");
    batBody.innerHTML = "";

    batsmen.forEach(b => {
      batBody.innerHTML += `
        <tr>
          <td>${b.name || "-"}</td>
          <td>${b.runs ?? "-"}</td>
          <td>${b.balls ?? "-"}</td>
          <td>${b.fours ?? "-"}</td>
          <td>${b.sixes ?? "-"}</td>
          <td>${b.strikeRate ?? "-"}</td>
          <td>${b.outdec || "not out"}</td>
        </tr>
      `;
    });

    const bowlBody = document.querySelector("#bowlTable tbody");
    bowlBody.innerHTML = "";

    bowlers.forEach(b => {
      bowlBody.innerHTML += `
        <tr>
          <td>${b.name || "-"}</td>
          <td>${b.overs ?? "-"}</td>
          <td>${b.maidens ?? "-"}</td>
          <td>${b.runs ?? "-"}</td>
          <td>${b.wickets ?? "-"}</td>
          <td>${b.dots ?? "-"}</td>
          <td>${b.economy ?? "-"}</td>
        </tr>
      `;
    });

    status.innerHTML = "Scorecard loaded";
  } catch (err) {
    console.error(err);
    status.innerHTML = `Error loading scorecard: ${err.message}`;
  }
}

loadMatches();
</script>
