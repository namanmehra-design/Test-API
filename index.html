<!DOCTYPE html>
<html>
<head>

<title>🏏 CricViz Analytics Dashboard</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
margin:0;
background:#0b1220;
color:white;
font-family:system-ui;
}

header{
padding:20px;
font-size:26px;
font-weight:bold;
color:#ffc857;
border-bottom:1px solid #222;
}

.container{
display:flex;
height:92vh;
}

.sidebar{
width:320px;
background:#111a2e;
padding:20px;
overflow-y:auto;
}

.match{
padding:12px;
border-radius:10px;
margin-bottom:12px;
background:#1b2644;
cursor:pointer;
}

.match:hover{
background:#2c3c66;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{
margin-bottom:40px;
}

.tables{
display:flex;
gap:40px;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
padding:6px;
border-bottom:1px solid #2a3554;
font-size:14px;
}

th{
color:#ffc857;
}

.phase{
display:flex;
gap:20px;
}

.phaseBox{
flex:1;
background:#1b2644;
padding:20px;
border-radius:10px;
text-align:center;
font-size:18px;
}

.chart{
height:320px;
}

</style>

</head>

<body>

<header>🏏 CricViz Analytics Dashboard</header>

<div class="container">

<div class="sidebar" id="matches">
Loading matches...
</div>

<div class="main">

<h2 id="matchTitle"></h2>

<div class="section tables">

<div>
<h3>Batting</h3>
<table id="batTable"></table>
</div>

<div>
<h3>Bowling</h3>
<table id="bowlTable"></table>
</div>

</div>

<div class="section">

<h3>Run Progression</h3>
<div id="worm" class="chart"></div>

</div>

<div class="section">

<h3>Fantasy Points</h3>
<table id="fantasyTable"></table>

</div>

<div class="section">

<h3>Phase Scoring</h3>

<div class="phase">

<div class="phaseBox" id="power"></div>
<div class="phaseBox" id="middle"></div>
<div class="phaseBox" id="death"></div>

</div>

</div>

</div>

</div>

<script>

const API="https://cricbuzz.namanmehra.workers.dev"

async function api(endpoint){

const r=await fetch(`${API}?endpoint=${endpoint}`)

return await r.json()

}

async function loadMatches(){

const data=await api("/matches/v1/live")

const matches=[]

data.typeMatches.forEach(type=>{

type.seriesMatches.forEach(series=>{

if(series.seriesAdWrapper){

series.seriesAdWrapper.matches.forEach(m=>{

matches.push(m)

})

}

})

})

renderMatches(matches)

}

function renderMatches(matches){

const container=document.getElementById("matches")

container.innerHTML=""

matches.forEach(m=>{

const div=document.createElement("div")

div.className="match"

div.innerHTML=`
<b>${m.matchInfo.team1.teamName}</b><br>
vs<br>
<b>${m.matchInfo.team2.teamName}</b><br>
<small>${m.matchInfo.status}</small>
`

div.onclick=()=>loadMatch(m.matchInfo.matchId)

container.appendChild(div)

})

}

async function loadMatch(matchId){

const data=await api(`/mcenter/v1/${matchId}/hscard`)

const header=data.matchHeader

document.getElementById("matchTitle").innerText=
`${header.team1.name} vs ${header.team2.name}`

renderBatting(data)

renderBowling(data)

renderFantasy(data)

renderWorm(data)

renderPhase(data)

}

function renderBatting(data){

const table=document.getElementById("batTable")

table.innerHTML="<tr><th>Player</th><th>Runs</th><th>Balls</th><th>4s</th><th>6s</th></tr>"

Object.values(data.scoreCard[0].batTeamDetails.batsmenData)
.forEach(b=>{

table.innerHTML+=`
<tr>
<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
</tr>
`

})

}

function renderBowling(data){

const table=document.getElementById("bowlTable")

table.innerHTML="<tr><th>Bowler</th><th>Overs</th><th>Runs</th><th>Wkts</th><th>Dots</th></tr>"

Object.values(data.scoreCard[0].bowTeamDetails.bowlersData)
.forEach(b=>{

table.innerHTML+=`
<tr>
<td>${b.bowlerName}</td>
<td>${b.overs}</td>
<td>${b.runs}</td>
<td>${b.wickets}</td>
<td>${b.dots || 0}</td>
</tr>
`

})

}

function renderFantasy(data){

const table=document.getElementById("fantasyTable")

table.innerHTML="<tr><th>Player</th><th>Fantasy Points</th></tr>"

Object.values(data.scoreCard[0].batTeamDetails.batsmenData)
.forEach(b=>{

let pts=0

pts+=b.runs
pts+=b.fours*1
pts+=b.sixes*2

if(b.runs>=50) pts+=8
if(b.runs>=100) pts+=16

table.innerHTML+=`
<tr>
<td>${b.batName}</td>
<td>${pts}</td>
</tr>
`

})

}

function renderWorm(data){

const runs=data.scoreCard.map(i=>i.scoreDetails.runs)

Plotly.newPlot("worm",[{
y:runs,
type:"scatter",
mode:"lines+markers",
line:{color:"#ffc857"}
}],
{
paper_bgcolor:"#0b1220",
plot_bgcolor:"#0b1220",
font:{color:"white"}
})

}

function renderPhase(data){

let power=0
let middle=0
let death=0

data.scoreCard.forEach(i=>{

const r=i.scoreDetails.runs
const o=i.scoreDetails.overs

if(o<=6) power+=r
else if(o<=15) middle+=r
else death+=r

})

document.getElementById("power").innerHTML=
`Powerplay<br><b>${power}</b>`

document.getElementById("middle").innerHTML=
`Middle Overs<br><b>${middle}</b>`

document.getElementById("death").innerHTML=
`Death Overs<br><b>${death}</b>`

}

loadMatches()

</script>

</body>
</html>
