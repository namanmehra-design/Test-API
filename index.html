<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CricViz Shadow Dashboard</title>
    <style>
        body { background:#0b1220; color:white; font-family: 'DM Sans', sans-serif; margin:0; }
        header { padding:20px; font-size:24px; font-weight:bold; color:#ffc857; border-bottom: 1px solid #1b2644; display: flex; justify-content: space-between; align-items: center; }
        .container { display:flex; height:90vh; }
        .sidebar { width:320px; background:#111a2e; overflow-y:auto; padding:20px; border-right: 1px solid #1b2644; }
        .match-card { padding:15px; border-radius:10px; margin-bottom:12px; background:#1b2644; cursor:pointer; border: 1px solid transparent; }
        .match-card.active { border-color: #ffc857; background: #2a3a66; }
        .main { flex:1; padding:25px; overflow:auto; }
        .stat-hi { color: #10B981; font-weight: bold; }
        .badge-motm { background: #ffc857; color: #000; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 13px; margin-bottom: 20px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.1); }
        th, td { padding: 12px; border-bottom: 1px solid #2a3554; text-align: left; font-size: 14px; }
        th { color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <span>🏏 CricViz Live Scorecard</span>
    <span id="syncStatus" style="font-size: 12px; color: #10B981;">● Connected</span>
</header>

<div class="container">
    <div class="sidebar" id="sideMatchList">Loading matches...</div>
    <div class="main">
        <div id="motmSlot"></div>
        <h2 id="displayTitle">Initializing Scoreboard...</h2>
        
        <div id="dashboardContent" style="display:none;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div><h3>Batting Performance</h3><table id="batTable"></table></div>
                <div><h3>Bowling & Dot Balls</h3><table id="bowlTable"></table></div>
            </div>
        </div>
    </div>
</div>

<script>
// Pointing to your verified Cloudflare Worker
const WORKER_URL = "https://cricbuzz.namanmehra.workers.dev";

async function callAPI(path) {
    const res = await fetch(`${WORKER_URL}?endpoint=${encodeURIComponent(path)}`);
    return await res.json();
}

async function startDashboard() {
    try {
        const liveData = await callAPI("/matches/v1/live");
        let allMatches = [];
        liveData.typeMatches.forEach(t => t.seriesMatches?.forEach(s => s.seriesAdWrapper?.matches?.forEach(m => allMatches.push(m))));
        
        const sidebar = document.getElementById("sideMatchList");
        sidebar.innerHTML = allMatches.map(m => `
            <div class="match-card" id="match_${m.matchInfo.matchId}" onclick="autoPopulate(${m.matchInfo.matchId})">
                <b>${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</b><br>
                <small style="color:#aaa">${m.matchInfo.status}</small>
            </div>
        `).join('');

        // AUTO-POPULATE: Immediately load the first match in the list
        if (allMatches.length > 0) autoPopulate(allMatches[0].matchInfo.matchId);

    } catch (err) {
        document.getElementById("sideMatchList").innerText = "Failed to sync live matches.";
    }
}

async function autoPopulate(matchId) {
    // UI selection state
    document.querySelectorAll('.match-card').forEach(el => el.classList.remove('active'));
    document.getElementById(`match_${matchId}`)?.classList.add('active');

    const data = await callAPI(`/mcenter/v1/${matchId}/hscard`);
    document.getElementById("dashboardContent").style.display = "block";
    document.getElementById("displayTitle").innerText = data.matchHeader.matchDescription;

    // Man of the Match
    const motm = data.matchHeader.playersOfTheMatch?.[0]?.name || "Match In Progress";
    document.getElementById("motmSlot").innerHTML = `<div class="badge-motm">🏆 PLAYER OF THE MATCH: ${motm}</div>`;

    // Render Innings 1 Batting
    const batsmen = Object.values(data.scoreCard[0].batTeamDetails.batsmenData);
    let batRows = `<tr><th>Player</th><th>Runs</th><th>Balls</th><th>6s</th><th>SR</th></tr>`;
    batsmen.forEach(p => {
        batRows += `<tr><td>${p.batName}</td><td class="stat-hi">${p.runs}</td><td>${p.balls}</td><td>${p.sixes}</td><td>${p.strikeRate}</td></tr>`;
    });
    document.getElementById("batTable").innerHTML = batRows;

    // Render Innings 1 Bowling (Including requested Dot Ball field)
    const bowlers = Object.values(data.scoreCard[0].bowTeamDetails.bowlersData);
    let bowlRows = `<tr><th>Bowler</th><th>Overs</th><th>Wkts</th><th>Dots (0s)</th><th>Econ</th></tr>`;
    bowlers.forEach(b => {
        bowlRows += `<tr><td>${b.bowlerName}</td><td>${b.overs}</td><td class="stat-hi">${b.wickets}</td><td style="color:#ffc857">${b.dots || 0}</td><td>${b.economy}</td></tr>`;
    });
    document.getElementById("bowlTable").innerHTML = bowlRows;
}

startDashboard();
</script>
</body>
</html>
