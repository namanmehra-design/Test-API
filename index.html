<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricViz Style Cricket Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b0f18;
color:#eaeaea;
font-family:system-ui;
margin:0;
padding:20px;
}

h1{
color:#f4b942;
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

.panel{
background:#121826;
border-radius:10px;
padding:15px;
}

.match{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
}

.match:hover{
background:#1f2937;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,.08);
}

th{
color:#f4b942;
font-size:12px;
text-transform:uppercase;
}

.chart{
margin-top:20px;
}

.phaseBox{
display:flex;
gap:10px;
margin-top:20px;
}

.phase{
background:#1f2937;
padding:10px;
border-radius:6px;
flex:1;
text-align:center;
}

</style>

</head>

<body>

<h1>🏏 CricViz Style Match Dashboard</h1>

<div class="layout">

<div class="panel">
<h3>Matches</h3>
<div id="matches">Loading matches...</div>
</div>

<div class="panel">

<div id="matchInfo">Select a match</div>

<canvas id="runrateChart" class="chart"></canvas>

<div class="phaseBox">
<div class="phase" id="powerplay">Powerplay</div>
<div class="phase" id="middle">Middle</div>
<div class="phase" id="death">Death</div>
</div>

<div id="scorecard"></div>

</div>

</div>

<script>

const API_KEY="6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095"
const HOST="cricbuzz-cricket.p.rapidapi.com"

async function api(endpoint){

try{

const res = await fetch(
"https://corsproxy.io/?https://"+HOST+endpoint,
{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":HOST
}
}
)

return await res.json()

}catch(e){

alert("API connection failed")
return null

}

}

async function loadMatches(){

const data=await api("/matches/v1/recent")

if(!data) return

let html=""

data.typeMatches.forEach(t=>{
t.seriesMatches.forEach(s=>{

if(!s.seriesAdWrapper) return

s.seriesAdWrapper.matches.forEach(m=>{

const info=m.matchInfo

html+=`
<div class="match" onclick="loadMatch(${info.matchId})">
<b>${info.team1.teamName} vs ${info.team2.teamName}</b>
<br>${info.status}
</div>
`

})

})
})

document.getElementById("matches").innerHTML=html

}

async function loadMatch(id){

const score=await api(`/mcenter/v1/${id}/hscard`)
const overs=await api(`/mcenter/v1/${id}/overs`)

if(!score) return

renderScore(score)
renderRunRate(overs)
renderPhases(overs)

}

function renderScore(data){

const header=data.matchHeader

let html=`<h2>${header.matchDescription}</h2>`
html+=`<p>${header.status}</p>`

data.scoreCard.forEach(sc=>{

const team=sc.batTeamDetails.batTeamName
const score=`${sc.scoreDetails.runs}/${sc.scoreDetails.wickets} (${sc.scoreDetails.overs})`

html+=`<h3>${team} — ${score}</h3>`

html+=`
<table>
<tr>
<th>Batter</th>
<th>Runs</th>
<th>Balls</th>
<th>4s</th>
<th>6s</th>
<th>SR</th>
</tr>
`

Object.values(sc.batTeamDetails.batsmenData).forEach(b=>{

html+=`
<tr>
<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
<td>${b.strikeRate}</td>
</tr>
`

})

html+="</table>"

})

document.getElementById("scorecard").innerHTML=html

}

function renderRunRate(overs){

if(!overs || !overs.overSummaryList) return

const oversData=overs.overSummaryList

let runs=[]
let labels=[]

oversData.forEach(o=>{
runs.push(o.runs)
labels.push("Over "+o.overNum)
})

const ctx=document.getElementById("runrateChart")

new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Runs per Over",
data:runs,
borderColor:"#f4b942",
backgroundColor:"rgba(244,185,66,.2)"
}]
},
options:{
plugins:{legend:{labels:{color:"#fff"}}},
scales:{
x:{ticks:{color:"#fff"}},
y:{ticks:{color:"#fff"}}
}
}
})

}

function renderPhases(overs){

if(!overs || !overs.overSummaryList) return

let pp=0, mid=0, death=0

overs.overSummaryList.forEach(o=>{

if(o.overNum<=6) pp+=o.runs
else if(o.overNum<=15) mid+=o.runs
else death+=o.runs

})

document.getElementById("powerplay").innerHTML="Powerplay<br>"+pp+" runs"
document.getElementById("middle").innerHTML="Middle<br>"+mid+" runs"
document.getElementById("death").innerHTML="Death<br>"+death+" runs"

}

loadMatches()

</script>

</body>
</html>
