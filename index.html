<!DOCTYPE html>
<html>
<head>
    <title>Simple Scorecard Test</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .match-btn { background: #333; color: #fff; padding: 10px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #222; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background: #444; color: #ffc857; }
        .loading { color: #ffc857; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🏏 Basic Scorecard Sync</h2>
    <div id="status">Fetching Match List...</div>
    <div id="matchButtons"></div>
    
    <div id="scorecardArea" style="display:none;">
        <h3 id="mName"></h3>
        <h4>Batting</h4>
        <table id="batTable"></table>
        <h4>Bowling</h4>
        <table id="bowlTable"></table>
    </div>

<script>
const WORKER = "https://cricbuzz.namanmehra.workers.dev";

async function api(path) {
    const r = await fetch(`${WORKER}?endpoint=${encodeURIComponent(path)}`);
    return await r.json();
}

async function start() {
    try {
        const data = await api("/matches/v1/live");
        document.getElementById("status").innerText = "Click a match below:";
        
        let matches = [];
        data.typeMatches.forEach(t => t.seriesMatches?.forEach(s => s.seriesAdWrapper?.matches?.forEach(m => matches.push(m.matchInfo))));
        
        document.getElementById("matchButtons").innerHTML = matches.map(m => 
            `<button class="match-btn" onclick="showScore(${m.matchId})">${m.team1.teamName} vs ${m.team2.teamName}</button>`
        ).join('');
    } catch (e) {
        document.getElementById("status").innerText = "Connection Error! Check Cloudflare logs.";
    }
}

async function showScore(id) {
    document.getElementById("status").innerText = "Loading Scorecard...";
    try {
        const data = await api(`/mcenter/v1/${id}/hscard`);
        document.getElementById("scorecardArea").style.display = "block";
        document.getElementById("mName").innerText = data.matchHeader.matchDescription;

        // Force select the first available scorecard entry
        const inn = data.scoreCard[0];

        // Fill Batting
        let bat = `<tr><th>Batsman</th><th>Runs</th><th>Balls</th></tr>`;
        Object.values(inn.batTeamDetails.batsmenData).forEach(p => {
            bat += `<tr><td>${p.batName}</td><td>${p.runs}</td><td>${p.balls}</td></tr>`;
        });
        document.getElementById("batTable").innerHTML = bat;

        // Fill Bowling
        let bowl = `<tr><th>Bowler</th><th>Overs</th><th>Wickets</th><th>Dots</th></tr>`;
        Object.values(inn.bowTeamDetails.bowlersData).forEach(b => {
            bowl += `<tr><td>${b.bowlerName}</td><td>${b.overs}</td><td>${b.wickets}</td><td>${b.dots || 0}</td></tr>`;
        });
        document.getElementById("bowlTable").innerHTML = bowl;

        document.getElementById("status").innerText = "Done.";
    } catch (e) {
        document.getElementById("status").innerText = "Scorecard Data Missing for this match.";
    }
}

start();
</script>
</body>
</html>
