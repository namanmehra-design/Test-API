<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL 2025 Scorecard: MI vs CSK</title>
    <style>
        :root { --gold: #D4A847; --bg: #07090F; --bg2: #0C1018; --txt: #EDE9E0; --bdr: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); padding: 20px; }
        .match-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 12px; padding: 25px; max-width: 950px; margin: 0 auto; }
        h2, h3 { color: var(--gold); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-bottom: 10px; }
        .btn-fetch { background: var(--gold); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: rgba(0,0,0,0.2); }
        th { text-align: left; color: var(--gold); border-bottom: 2px solid var(--bdr); padding: 12px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--bdr); font-size: 0.9rem; }
        .out-desc { color: #9CA3AF; font-style: italic; font-size: 0.8rem; }
        #status { margin-bottom: 15px; font-size: 0.85rem; padding: 10px; border-radius: 4px; }
        .err-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--err); color: #EF4444; }
    </style>
</head>
<body>

<div class="match-card">
    <h2>IPL 2025: MI vs CSK (Match ID: 104367)</h2>
    <button class="btn-fetch" onclick="fetchIPLData()">Load MI vs CSK Scorecard</button>
    <div id="status">Ready to fetch data...</div>

    <div id="data-tables" style="display:none;">
        <h3>🏏 Batsmen Data</h3>
        <table id="battingTable">
            <thead>
                <tr>
                    <th>Batsman</th>
                    <th>Runs</th>
                    <th>Balls</th>
                    <th>4s</th>
                    <th>6s</th>
                    <th>S/R</th>
                    <th>Mode of Dismissal</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3> bowling 🎳 Bowlers Data</h3>
        <table id="bowlingTable">
            <thead>
                <tr>
                    <th>Bowler</th>
                    <th>Overs</th>
                    <th>Mdns</th>
                    <th>Runs</th>
                    <th>Wkts</th>
                    <th>Econ</th>
                    <th>0s</th>
                    <th>Wides</th>
                    <th>NB</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
async function fetchIPLData() {
    const matchId = "104367"; // MI vs CSK IPL 2025
    const apiKey = "6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095"; 
    const status = document.getElementById('status');
    const dataTables = document.getElementById('data-tables');
    
    status.innerText = "⚡ Requesting data from Cricbuzz...";
    status.className = "";
    dataTables.style.display = "none";

    // Standard RapidAPI Request Options
    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': apiKey,
            'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
        }
    };

    try {
        // MUST USE HTTPS to avoid browser security pattern errors
        const response = await fetch(`https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${matchId}/hscard`, options);
        
        if (!response.ok) {
            throw new Error(`API returned ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        if (!data.scoreCard || data.scoreCard.length === 0) {
            throw new Error("Scorecard data empty. Check Match ID or API subscription.");
        }

        dataTables.style.display = 'block';
        
        // ── Render Batting (CSK Innings) ──
        const batBody = document.querySelector('#battingTable tbody');
        batBody.innerHTML = '';
        const batsmen = data.scoreCard[0].batTeamDetails.batsmenData;
        Object.values(batsmen).forEach(b => {
            batBody.innerHTML += `<tr>
                <td><b>${b.batName}</b></td>
                <td>${b.runs}</td>
                <td>${b.balls}</td>
                <td>${b.fours}</td>
                <td>${b.sixes}</td>
                <td>${b.strikeRate}</td>
                <td class="out-desc">${b.outDesc}</td>
            </tr>`;
        });

        // ── Render Bowling (MI Bowlers) ──
        const bowlBody = document.querySelector('#bowlingTable tbody');
        bowlBody.innerHTML = '';
        const bowlers = data.scoreCard[0].bowTeamDetails.bowlersData;
        Object.values(bowlers).forEach(bw => {
            bowlBody.innerHTML += `<tr>
                <td><b>${bw.bowlerName}</b></td>
                <td>${bw.overs}</td>
                <td>${bw.maidens}</td>
                <td>${bw.runs}</td>
                <td>${bw.wickets}</td>
                <td>${bw.economy}</td>
                <td>${bw.dots}</td>
                <td>${bw.wides}</td>
                <td>${bw.no_balls}</td>
            </tr>`;
        });

        status.innerHTML = "✅ <b>Success!</b> Scorecard for MI vs CSK (Match 38) loaded.";
        status.style.color = "#10B981";
    } catch (err) {
        status.className = "err-msg";
        status.innerHTML = `❌ <b>Fetch Error:</b> ${err.message}<br><small>Tip: If using Safari/Chrome, ensure you are not blocking cross-site tracking in settings.</small>`;
        console.error("Full Error:", err);
    }
}
</script>

</body>
</html>
