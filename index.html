<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CricViz Universal Scorecard</title>
    <style>
        :root { --gold: #ffc857; --bg: #0b1220; --panel: #111a2e; --txt: #ffffff; --border: #2a3554; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 20px; font-weight: bold; color: var(--gold); }
        .app { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; }
        .match-card { padding: 12px; border-radius: 8px; background: #1b2644; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .match-card.active { border-color: var(--gold); background: #2a3a66; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .section { margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 8px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
        th { color: var(--gold); text-transform: uppercase; font-size: 11px; }
        .stat-hi { color: #10B981; font-weight: bold; }
        .error-msg { color: #ef4444; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<header>🏏 CricViz Universal Dashboard</header>

<div class="app">
    <div class="sidebar" id="matchList">Scanning for matches...</div>
    <div class="main">
        <h2 id="matchTitle">Select a Match</h2>
        <div id="matchStatus" style="color: #888; margin-top: -10px; margin-bottom: 20px;"></div>
        
        <div id="scorecardDisplay" style="display:none;">
            <div class="section">
                <h3>Latest Batting</h3>
                <table id="batTable"></table>
            </div>
            <div class="section">
                <h3>Latest Bowling (Dots & Maidens)</h3>
                <table id="bowlTable"></table>
            </div>
        </div>
    </div>
</div>

<script>
const WORKER = "https://cricbuzz.namanmehra.workers.dev";

async function api(endpoint) {
    const res = await fetch(`${WORKER}?endpoint=${encodeURIComponent(endpoint)}`);
    return await res.json();
}

async function init() {
    try {
        // MODULE 1: Live Matches List
        const data = await api("/matches/v1/live");
        let matches = [];
        data.typeMatches.forEach(t => t.seriesMatches?.forEach(s => s.seriesAdWrapper?.matches?.forEach(m => matches.push(m))));
        
        document.getElementById("matchList").innerHTML = matches.map(m => `
            <div class="match-card" id="m${m.matchInfo.matchId}" onclick="loadFullData(${m.matchInfo.matchId})">
                <b>${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</b><br>
                <small>${m.matchInfo.status}</small>
            </div>
        `).join('');

        if(matches.length > 0) loadFullData(matches[0].matchInfo.matchId);
    } catch (e) { document.getElementById("matchList").innerHTML = "Connection Error"; }
}

async function loadFullData(id) {
    document.querySelectorAll('.match-card').forEach(el => el.classList.remove('active'));
    document.getElementById(`m${id}`)?.classList.add('active');

    try {
        // MODULE 2: Scorecard (hscard) & MODULE 3: Overs (overs)
        const [score, overs] = await Promise.all([
            api(`/mcenter/v1/${id}/hscard`),
            api(`/mcenter/v1/${id}/overs`)
        ]);

        if (!score.scoreCard || score.scoreCard.length === 0) {
            document.getElementById("matchTitle").innerText = "Match Pending";
            document.getElementById("scorecardDisplay").style.display = "none";
            return;
        }

        document.getElementById("scorecardDisplay").style.display = "block";
        document.getElementById("matchTitle").innerText = score.matchHeader.matchDescription;
        document.getElementById("matchStatus").innerText = score.matchHeader.status;

        // FORMAT LOGIC: Always pick the very last innings (works for Tests/ODIs/T20s)
        const currentInn = score.scoreCard[score.scoreCard.length - 1];

        // BATTING RENDER
        let batHtml = `<tr><th>Batsman</th><th>R</th><th>B</th><th>6s</th><th>SR</th></tr>`;
        Object.values(currentInn.batTeamDetails.batsmenData).forEach(p => {
            batHtml += `<tr><td>${p.batName}</td><td class="stat-hi">${p.runs}</td><td>${p.balls}</td><td>${p.sixes}</td><td>${p.strikeRate}</td></tr>`;
        });
        document.getElementById("batTable").innerHTML = batHtml;

        // BOWLING RENDER (Includes Dots as requested)
        let bowlHtml = `<tr><th>Bowler</th><th>O</th><th>W</th><th>Dots</th><th>Econ</th></tr>`;
        Object.values(currentInn.bowTeamDetails.bowlersData).forEach(b => {
            bowlHtml += `<tr><td>${b.bowlerName}</td><td>${b.overs}</td><td class="stat-hi">${b.wickets}</td><td style="color:#ffc857">${b.dots || 0}</td><td>${b.economy}</td></tr>`;
        });
        document.getElementById("bowlTable").innerHTML = bowlHtml;

    } catch (e) { console.error(e); }
}

init();
</script>
</body>
</html>
