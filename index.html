<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CricViz Pro Master Analytics</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    :root { --bg: #07090f; --panel: #0c1018; --line: rgba(255,255,255,0.08); --gold: #d4a847; --text: #eef2f7; --muted: #8b9bb4; }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    header { padding: 15px 20px; font-size: 22px; font-weight: 800; color: var(--gold); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
    .app { display: flex; height: calc(100vh - 65px); }
    .sidebar { width: 340px; background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; }
    .sidebar-top { padding: 15px; position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid var(--line); z-index: 5; }
    .tab-row { display: flex; gap: 8px; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .match { padding: 15px; border-bottom: 1px solid var(--line); cursor: pointer; transition: 0.2s; }
    .match:hover { background: rgba(255,200,87,0.05); }
    .match.active { background: #1a2333; border-left: 4px solid var(--gold); }
    .main { flex: 1; padding: 25px; overflow-y: auto; }
    .hero { margin-bottom: 25px; }
    .grid { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
    .card h3 { color: var(--gold); margin-top: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .kpis { display: flex; gap: 15px; justify-content: space-around; }
    .kpi { text-align: center; }
    .kpi .val { font-size: 32px; font-weight: 800; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--muted); padding: 8px; border-bottom: 2px solid var(--line); font-size: 11px; }
    td { padding: 12px 8px; border-bottom: 1px solid var(--line); }
    .stat-hi { font-weight: bold; color: #10b981; }
  </style>
</head>
<body>

<header>
    <span>🏏 CricViz Master Analytics</span>
    <div style="font-size: 12px; color: var(--muted);"><span id="syncStatus">● Sync Active</span></div>
</header>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="tab-row">
                <button class="tab-btn active" onclick="loadMatches('live')">LIVE</button>
                <button class="tab-btn" onclick="loadMatches('recent')">RECENT</button>
            </div>
        </div>
        <div id="matchList"></div>
    </aside>

    <main class="main">
        <div class="hero">
            <h2 id="mTitle">Select a Match</h2>
            <p id="mSub" style="color: var(--muted);"></p>
        </div>

        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <h3>Phase Scoring (Latest Innings)</h3>
                <div class="kpis">
                    <div class="kpi"><div class="val" id="p1">0</div><small>Powerplay (1-6)</small></div>
                    <div class="kpi"><div class="val" id="p2">0</div><small>Middle (7-15)</small></div>
                    <div class="kpi"><div class="val" id="p3">0</div><small>Death (16-20)</small></div>
                </div>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>Innings Progression</h3>
                <div id="wormChart"></div>
            </div>

            <div class="card">
                <h3>Batting</h3>
                <table id="batBody"></table>
            </div>

            <div class="card">
                <h3>Bowling</h3>
                <table id="bowlBody"></table>
            </div>
        </div>
    </main>
</div>

<script>
const WORKER = "https://cricbuzz.namanmehra.workers.dev";
let activeMatchId = null;

async function api(path) {
    const r = await fetch(`${WORKER}?endpoint=${encodeURIComponent(path)}`);
    return await r.json();
}

async function loadMatches(type) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === type));
    const data = await api(`/matches/v1/${type}`);
    let matches = [];
    data.typeMatches.forEach(t => t.seriesMatches?.forEach(s => s.seriesAdWrapper?.matches?.forEach(m => matches.push(m.matchInfo))));
    
    document.getElementById("matchList").innerHTML = matches.map(m => `
        <div class="match ${m.matchId === activeMatchId ? 'active' : ''}" id="m${m.matchId}" onclick="renderMatch(${m.matchId})">
            <b>${m.team1.teamName} vs ${m.team2.teamName}</b><br>
            <small style="color:#888">${m.status}</small>
        </div>
    `).join('');
}

async function renderMatch(id) {
    activeMatchId = id;
    document.querySelectorAll('.match').forEach(el => el.classList.remove('active'));
    document.getElementById(`m${id}`).classList.add('active');

    const [score, overs] = await Promise.all([
        api(`/mcenter/v1/${id}/hscard`),
        api(`/mcenter/v1/${id}/overs`)
    ]);

    // Handle Header
    document.getElementById("mTitle").innerText = score.matchHeader.matchDescription;
    document.getElementById("mSub").innerText = `${score.matchHeader.status} | ${score.matchHeader.venue.name}`;

    // Handle Scorecard - Auto-detect the last innings with data
    const innings = score.scoreCard || [];
    const currentInn = innings.length > 0 ? innings[innings.length - 1] : null;

    if (currentInn) {
        // Batting
        let bHtml = `<tr><th>Batsman</th><th>R</th><th>B</th><th>6s</th><th>SR</th></tr>`;
        Object.values(currentInn.batTeamDetails.batsmenData).forEach(p => {
            bHtml += `<tr><td>${p.batName}</td><td class="stat-hi">${p.runs}</td><td>${p.balls}</td><td>${p.sixes}</td><td>${p.strikeRate}</td></tr>`;
        });
        document.getElementById("batBody").innerHTML = bHtml;

        // Bowling
        let bowlHtml = `<tr><th>Bowler</th><th>O</th><th>W</th><th>Dots</th><th>Econ</th></tr>`;
        Object.values(currentInn.bowTeamDetails.bowlersData).forEach(b => {
            bowlHtml += `<tr><td>${b.bowlerName}</td><td>${b.overs}</td><td class="stat-hi">${b.wickets}</td><td style="color:var(--gold)">${b.dots || 0}</td><td>${b.economy}</td></tr>`;
        });
        document.getElementById("bowlBody").innerHTML = bowlHtml;
    } else {
        document.getElementById("batBody").innerHTML = "<tr><td class='msg'>No batting data available yet.</td></tr>";
        document.getElementById("bowlBody").innerHTML = "<tr><td class='msg'>No bowling data available yet.</td></tr>";
    }

    // Handle Worm & Phases
    renderGraphs(overs);
}

function renderGraphs(overs) {
    const summary = overs.overSummaryList || [];
    let cum = 0, p1=0, p2=0, p3=0;
    const x = [], y = [];

    summary.forEach(o => {
        cum += o.runs;
        x.push(o.overNum); y.push(cum);
        if(o.overNum <= 6) p1 += o.runs;
        else if(o.overNum <= 15) p2 += o.runs;
        else p3 += o.runs;
    });

    document.getElementById("p1").innerText = p1;
    document.getElementById("p2").innerText = p2;
    document.getElementById("p3").innerText = p3;

    Plotly.newPlot("wormChart", [{ x, y, type: 'scatter', mode: 'lines+markers', line: {color: '#d4a847', width: 3} }], {
        paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: {color: '#8b9bb4', size: 10},
        margin: {t:10, b:40, l:40, r:10}, xaxis: {gridcolor: '#1f2a44'}, yaxis: {gridcolor: '#1f2a44'}
    }, {responsive: true, displayModeBar: false});
}

loadMatches('live');
</script>
</body>
</html>
