<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cricbuzz Match Dashboard</title>

<style>

body{
background:#0b0f18;
color:#f4f1ea;
font-family:system-ui;
margin:0;
padding:20px;
}

h1{
color:#d4a847;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

.panel{
background:#111827;
border-radius:10px;
padding:15px;
}

.match{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
}

.match:hover{
background:#1f2937;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:14px;
}

th{
color:#d4a847;
text-align:left;
font-size:12px;
text-transform:uppercase;
}

.score{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.status{
margin-bottom:10px;
color:#9ca3af;
}

</style>
</head>

<body>

<h1>🏏 Cricbuzz Match Dashboard</h1>

<div class="container">

<div class="panel">

<div class="status" id="status">Loading matches...</div>

<div id="matchList"></div>

</div>

<div class="panel">

<div id="matchInfo"></div>

<div id="scorecard"></div>

</div>

</div>


<script>

const API_KEY="6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095"
const HOST="cricbuzz-cricket.p.rapidapi.com"

async function api(url){

const res=await fetch("https://"+HOST+url,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":HOST
}
})

return await res.json()

}


async function loadMatches(){

const data=await api("/matches/v1/recent")

let matches=[]

data.typeMatches.forEach(t=>{
t.seriesMatches.forEach(s=>{
(s.seriesAdWrapper.matches||[]).forEach(m=>{
matches.push(m.matchInfo)
})
})
})

renderMatches(matches)

}


function renderMatches(matches){

const list=document.getElementById("matchList")
list.innerHTML=""

matches.forEach(m=>{

const div=document.createElement("div")

div.className="match"

const t1=m.team1.teamName
const t2=m.team2.teamName

div.innerHTML=`<b>${t1} vs ${t2}</b><br>${m.status}`

div.onclick=()=>loadMatch(m.matchId)

list.appendChild(div)

})

document.getElementById("status").innerText="Click a match"

}


async function loadMatch(id){

document.getElementById("status").innerText="Loading match..."

const data=await api("/mcenter/v1/"+id+"/hscard")

renderScorecard(data)

}


function renderScorecard(data){

const header=data.matchHeader

const scorecards=data.scoreCard

let html=""

html+=`
<div class="score">
${header.matchDescription}
</div>
<div class="status">
${header.status}
</div>
`

scorecards.forEach(sc=>{

const team=sc.batTeamDetails.batTeamName
const score=sc.scoreDetails.runs+"/"+sc.scoreDetails.wickets+" ("+sc.scoreDetails.overs+" ov)"

html+=`<h2>${team} — ${score}</h2>`

const bats=Object.values(sc.batTeamDetails.batsmenData)

html+=`
<table>
<tr>
<th>Batter</th>
<th>Runs</th>
<th>Balls</th>
<th>4s</th>
<th>6s</th>
<th>SR</th>
</tr>
`

bats.forEach(b=>{

html+=`
<tr>
<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
<td>${b.strikeRate}</td>
</tr>
`

})

html+=`</table>`


const bowls=Object.values(sc.bowTeamDetails.bowlersData)

html+=`
<table>
<tr>
<th>Bowler</th>
<th>Overs</th>
<th>Runs</th>
<th>Wickets</th>
<th>Dots</th>
<th>Econ</th>
</tr>
`

bowls.forEach(b=>{

html+=`
<tr>
<td>${b.bowlerName}</td>
<td>${b.overs}</td>
<td>${b.runs}</td>
<td>${b.wickets}</td>
<td>${b.dots || 0}</td>
<td>${b.economy}</td>
</tr>
`

})

html+=`</table>`

})

document.getElementById("scorecard").innerHTML=html

document.getElementById("status").innerText="Match loaded"

}


loadMatches()

</script>

</body>
</html>
