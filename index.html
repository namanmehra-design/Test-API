<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricbuzz API Data Explorer - IPL 2025</title>
    <style>
        :root { --gold: #D4A847; --bg: #07090F; --bg2: #0C1018; --txt: #EDE9E0; --bdr: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        h2, h3 { color: var(--gold); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
        input, button { padding: 12px; border-radius: 6px; border: 1px solid var(--bdr); background: #111; color: #fff; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 2px solid var(--bdr); }
        td { padding: 10px; border-bottom: 1px solid var(--bdr); }
        .status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; color: #10B981; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏏 Cricbuzz Scorecard Data Explorer</h2>
        
        <div class="card">
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="text" id="matchId" value="40381" placeholder="Enter Match ID (e.g. 40381)">
                <button onclick="fetchCricbuzzData()">Fetch All Data Fields</button>
            </div>
            <div class="status" id="apiStatus">Enter a Match ID to view all required fantasy fields.</div>
        </div>

        <div id="resultsArea" style="display:none;">
            <div class="card">
                <h3>🏏 Batsman Data Fields</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Batsman</th>
                            <th>Runs</th>
                            <th>Balls</th>
                            <th>4s</th>
                            <th>6s</th>
                            <th>S/R</th>
                            <th>Mode of Dismissal</th>
                        </tr>
                    </thead>
                    <tbody id="battingTable"></tbody>
                </table>
            </div>

            <div class="card">
                <h3> bowling 🎳 Bowler Data Fields</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Bowler</th>
                            <th>Overs</th>
                            <th>Maidens</th>
                            <th>Runs Conc.</th>
                            <th>Wickets</th>
                            <th>Economy</th>
                            <th>Dots (0s)</th>
                            <th>Wides</th>
                            <th>No Balls</th>
                        </tr>
                    </thead>
                    <tbody id="bowlingTable"></tbody>
                </table>
            </div>

            <div class="card">
                <h3>📋 Raw API Response (JSON)</h3>
                <pre id="rawJson"></pre>
            </div>
        </div>
    </div>

    <script>
        async function fetchCricbuzzData() {
            const mId = document.getElementById('matchId').value;
            const status = document.getElementById('apiStatus');
            const apiKey = 'YOUR_RAPIDAPI_KEY_HERE'; // <--- PASTE YOUR KEY HERE
            
            status.textContent = "Fetching from Cricbuzz...";
            
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': apiKey,
                    'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(`https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${mId}/hscard`, options);
                const data = await response.json();
                
                if (!data.scoreCard) throw new Error("Scorecard not found. Check Match ID.");

                document.getElementById('resultsArea').style.display = 'block';
                document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
                
                // Process Batting (Innings 1)
                const batBody = document.getElementById('battingTable');
                batBody.innerHTML = '';
                const batsmen = data.scoreCard[0].batTeamDetails.batsmenData;
                Object.values(batsmen).forEach(b => {
                    batBody.innerHTML += `
                        <tr>
                            <td><b>${b.batName}</b></td>
                            <td>${b.runs}</td>
                            <td>${b.balls}</td>
                            <td>${b.fours}</td>
                            <td>${b.sixes}</td>
                            <td>${b.strikeRate}</td>
                            <td style="color:#d4a847">${b.outDesc}</td>
                        </tr>`;
                });

                // Process Bowling (Innings 1)
                const bowlBody = document.getElementById('bowlingTable');
                bowlBody.innerHTML = '';
                const bowlers = data.scoreCard[0].bowTeamDetails.bowlersData;
                Object.values(bowlers).forEach(bw => {
                    bowlBody.innerHTML += `
                        <tr>
                            <td><b>${bw.bowlerName}</b></td>
                            <td>${bw.overs}</td>
                            <td>${bw.maidens}</td>
                            <td>${bw.runs}</td>
                            <td>${bw.wickets}</td>
                            <td>${bw.economy}</td>
                            <td>${bw.dots}</td>
                            <td>${bw.wides}</td>
                            <td>${bw.no_balls}</td>
                        </tr>`;
                });

                status.textContent = "✅ Data Loaded Successfully.";
            } catch (err) {
                status.textContent = "❌ Error: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
