<!DOCTYPE html>
<html>
<head>

<title>CricViz Match Dashboard</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:20px;
font-size:26px;
font-weight:bold;
color:#ffc857;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:320px;
background:#111a2e;
overflow-y:auto;
padding:20px;
}

.match{
padding:12px;
border-radius:10px;
margin-bottom:12px;
background:#1b2644;
cursor:pointer;
}

.match:hover{
background:#2a3a66;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{
margin-bottom:40px;
}

.scorecards{
display:flex;
gap:40px;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
padding:6px;
border-bottom:1px solid #2a3554;
}

.phase{
display:flex;
gap:20px;
}

.phaseBox{
background:#1b2644;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<header>🏏 CricViz Style Match Dashboard</header>

<div class="container">

<div class="sidebar" id="matches">
Loading matches...
</div>

<div class="main">

<h2 id="matchTitle"></h2>

<div class="section scorecards">

<div>
<h3>Team 1</h3>
<table id="team1"></table>
</div>

<div>
<h3>Team 2</h3>
<table id="team2"></table>
</div>

</div>

<div class="section">

<h3>Run Progression</h3>
<div id="worm"></div>

</div>

<div class="section">

<h3>Phase Scoring</h3>

<div class="phase">
<div class="phaseBox" id="power"></div>
<div class="phaseBox" id="middle"></div>
<div class="phaseBox" id="death"></div>
</div>

</div>

</div>

</div>

<script>

const API="https://cricbuzz.namanmehra.workers.dev"

async function api(endpoint){
const r=await fetch(`${API}?endpoint=${endpoint}`)
return await r.json()
}

async function loadMatches(){

const data=await api("/matches/v1/live")

const matches=[]

data.typeMatches.forEach(type=>{
type.seriesMatches.forEach(series=>{
if(series.seriesAdWrapper){
series.seriesAdWrapper.matches.forEach(m=>{
matches.push(m)
})
}
})
})

renderMatches(matches)

}

function renderMatches(matches){

const container=document.getElementById("matches")

container.innerHTML=""

matches.forEach(m=>{

const div=document.createElement("div")
div.className="match"

div.innerHTML=`
<b>${m.matchInfo.team1.teamName}</b><br>
vs<br>
<b>${m.matchInfo.team2.teamName}</b><br>
<small>${m.matchInfo.status}</small>
`

div.onclick=()=>loadMatch(m.matchInfo.matchId)

container.appendChild(div)

})

}

async function loadMatch(matchId){

const data=await api(`/mcenter/v1/${matchId}/scard`)

const team1=data.matchHeader.team1.name
const team2=data.matchHeader.team2.name

document.getElementById("matchTitle").innerText=`${team1} vs ${team2}`

const innings=data.scoreCard

renderBatting(innings[0],"team1")
renderBatting(innings[1],"team2")

renderWorm(innings)

renderPhase(innings)

}

function renderBatting(inn,id){

const table=document.getElementById(id)

table.innerHTML="<tr><th>Player</th><th>Runs</th><th>Balls</th></tr>"

const players=inn.batTeamDetails.batsmenData

Object.values(players).forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.batName}</td>
<td>${p.runs}</td>
<td>${p.balls}</td>
</tr>
`

})

}

function renderWorm(innings){

const runs=innings.map(i=>i.scoreDetails.runs)

Plotly.newPlot("worm",[{
y:runs,
type:"scatter",
mode:"lines+markers",
line:{color:"#ffc857"}
}],
{
paper_bgcolor:"#0b1220",
plot_bgcolor:"#0b1220",
font:{color:"white"}
})

}

function renderPhase(innings){

let power=0
let middle=0
let death=0

innings.forEach(i=>{

const runs=i.scoreDetails.runs
const overs=i.scoreDetails.overs

if(overs<=6) power+=runs
else if(overs<=15) middle+=runs
else death+=runs

})

document.getElementById("power").innerHTML=`Powerplay<br><b>${power}</b>`
document.getElementById("middle").innerHTML=`Middle Overs<br><b>${middle}</b>`
document.getElementById("death").innerHTML=`Death Overs<br><b>${death}</b>`

}

loadMatches()

</script>

</body>
</html>
