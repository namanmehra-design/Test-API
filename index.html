<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL 2025 Scorecard: MI vs CSK</title>
    <style>
        :root { --gold: #D4A847; --bg: #07090F; --bg2: #0C1018; --txt: #EDE9E0; --bdr: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); padding: 20px; }
        .match-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 12px; padding: 25px; max-width: 950px; margin: 0 auto; }
        h2, h3 { color: var(--gold); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-bottom: 10px; }
        .btn-fetch { background: var(--gold); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: rgba(0,0,0,0.2); }
        th { text-align: left; color: var(--gold); border-bottom: 2px solid var(--bdr); padding: 12px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--bdr); font-size: 0.9rem; }
        .out-desc { color: #9CA3AF; font-style: italic; font-size: 0.8rem; }
        .pts-val { font-weight: bold; color: #10B981; }
    </style>
</head>
<body>

<div class="match-card">
    <h2>IPL 2025: MI vs CSK (Match ID: 104367)</h2>
    <button class="btn-fetch" onclick="fetchIPLData()">Load MI vs CSK Scorecard</button>
    <div id="status" style="margin-bottom:15px; font-size: 0.85rem;">Ready.</div>

    <div id="data-tables" style="display:none;">
        <h3>🏏 Batsmen (Required Fields)</h3>
        <table id="battingTable">
            <thead>
                <tr>
                    <th>Batsman</th>
                    <th>Runs</th>
                    <th>Balls</th>
                    <th>4s</th>
                    <th>6s</th>
                    <th>S/R</th>
                    <th>Mode of Dismissal</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>🎳 Bowlers (Required Fields)</h3>
        <table id="bowlingTable">
            <thead>
                <tr>
                    <th>Bowler</th>
                    <th>Overs</th>
                    <th>Mdns</th>
                    <th>Runs</th>
                    <th>Wkts</th>
                    <th>Econ</th>
                    <th>Dots (0s)</th>
                    <th>Wides</th>
                    <th>No Balls</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
async function fetchIPLData() {
    const matchId = "104367"; // Official Cricbuzz ID for MI vs CSK 2025 (Match 38)
    const apiKey = "6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095"; // Your RapidAPI Key
    const status = document.getElementById('status');
    
    status.innerText = "⚡ Fetching live data from Cricbuzz...";

    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': apiKey,
            'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
        }
    };

    try {
        const response = await fetch(`https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${matchId}/hscard`, options);
        const data = await response.json();

        if (!data.scoreCard) throw new Error("Could not find scorecard for this ID.");

        document.getElementById('data-tables').style.display = 'block';
        
        // --- Populating Batting ---
        const batBody = document.querySelector('#battingTable tbody');
        batBody.innerHTML = '';
        // Pulling from first innings (CSK)
        const batsmen = data.scoreCard[0].batTeamDetails.batsmenData;
        Object.values(batsmen).forEach(b => {
            batBody.innerHTML += `<tr>
                <td><b>${b.batName}</b></td>
                <td>${b.runs}</td>
                <td>${b.balls}</td>
                <td>${b.fours}</td>
                <td>${b.sixes}</td>
                <td>${b.strikeRate}</td>
                <td class="out-desc">${b.outDesc}</td>
            </tr>`;
        });

        // --- Populating Bowling ---
        const bowlBody = document.querySelector('#bowlingTable tbody');
        bowlBody.innerHTML = '';
        // Pulling MI bowlers from first innings
        const bowlers = data.scoreCard[0].bowTeamDetails.bowlersData;
        Object.values(bowlers).forEach(bw => {
            bowlBody.innerHTML += `<tr>
                <td><b>${bw.bowlerName}</b></td>
                <td>${bw.overs}</td>
                <td>${bw.maidens}</td>
                <td>${bw.runs}</td>
                <td>${bw.wickets}</td>
                <td>${bw.economy}</td>
                <td>${bw.dots}</td>
                <td>${bw.wides}</td>
                <td>${bw.no_balls}</td>
            </tr>`;
        });

        status.innerHTML = "✅ <b>MI vs CSK Scorecard Loaded.</b> All fields ready for fantasy calculation.";
    } catch (err) {
        status.innerHTML = "<span style='color:#EF4444'>❌ Error: " + err.message + "</span>";
    }
}
</script>

</body>
</html>
