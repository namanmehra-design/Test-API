<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cricbuzz Scorecard Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
body{
background:#08111f;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}

h1{
color:#ffc857;
}

.card{
background:#0f1b2f;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #1f2d49;
}

th{
color:#ffc857;
text-align:left;
}

#chart{
height:350px;
}
</style>
</head>

<body>

<h1>🏏 Cricbuzz Scorecard</h1>

<div class="card">
<h2 id="matchTitle">Loading match...</h2>
<p id="matchStatus"></p>
</div>

<div class="card">
<h3>Run Progression</h3>
<div id="chart"></div>
</div>

<div class="card">
<h3>Batting</h3>
<table id="battingTable"></table>
</div>

<div class="card">
<h3>Bowling</h3>
<table id="bowlingTable"></table>
</div>

<script>

const API_KEY = "6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095";
const API_HOST = "cricbuzz-cricket.p.rapidapi.com";
const MATCH_ID = 122698;

async function loadScorecard(){

const url = `https://${API_HOST}/mcenter/v1/${MATCH_ID}/scard`;

const res = await fetch(url,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":API_HOST
}
});

const data = await res.json();

const header = data.matchHeader;

document.getElementById("matchTitle").innerText =
header.team1.name + " vs " + header.team2.name;

document.getElementById("matchStatus").innerText =
header.status;


/* batting */

const innings = data.scoreCard[0];
const batsmen = innings.batTeamDetails.batsmenData;

let batHTML = `
<tr>
<th>Player</th>
<th>Runs</th>
<th>Balls</th>
<th>4s</th>
<th>6s</th>
<th>SR</th>
</tr>
`;

Object.values(batsmen).forEach(b=>{

batHTML += `
<tr>
<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
<td>${b.strikeRate}</td>
</tr>
`;

});

document.getElementById("battingTable").innerHTML = batHTML;


/* bowling */

const bowlers = innings.bowlTeamDetails.bowlersData;

let bowlHTML = `
<tr>
<th>Bowler</th>
<th>Overs</th>
<th>Runs</th>
<th>Wickets</th>
</tr>
`;

Object.values(bowlers).forEach(b=>{

bowlHTML += `
<tr>
<td>${b.bowlerName}</td>
<td>${b.overs}</td>
<td>${b.runs}</td>
<td>${b.wickets}</td>
</tr>
`;

});

document.getElementById("bowlingTable").innerHTML = bowlHTML;


/* run chart */

let x=[];
let y=[];
let total=0;

data.overSummaryList.forEach((o,i)=>{

total+=o.runs;

x.push("Over "+(i+1));
y.push(total);

});

Plotly.newPlot("chart",[{
x:x,
y:y,
mode:"lines+markers",
type:"scatter",
line:{color:"#ffc857"}
}],
{
paper_bgcolor:"#0f1b2f",
plot_bgcolor:"#0f1b2f",
font:{color:"white"}
});

}

loadScorecard();

</script>

</body>
</html>
