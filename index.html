<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricViz Analytics Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#0b1423;
color:white;
}

header{
padding:20px;
font-size:24px;
font-weight:600;
border-bottom:1px solid #1f2a44;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:320px;
background:#0f1b2f;
overflow:auto;
border-right:1px solid #1f2a44;
}

.match{
padding:14px;
border-bottom:1px solid #1c2740;
cursor:pointer;
}

.match:hover{
background:#182746;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.tabs{
margin-bottom:20px;
}

button{
margin-right:8px;
padding:8px 14px;
background:#1b2a4a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#294072;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #1f2a44;
}

.section{
margin-top:30px;
}

</style>
</head>

<body>

<header>
🏏 CricViz Analytics Dashboard
</header>

<div class="container">

<div class="sidebar">
<div class="tabs">
<button onclick="loadMatches('live')">Live</button>
<button onclick="loadMatches('upcoming')">Upcoming</button>
<button onclick="loadMatches('recent')">Recent</button>
</div>

<div id="matches"></div>
</div>

<div class="main">

<h2 id="matchTitle">Select a match</h2>

<div class="section">
<h3>Batting</h3>
<table id="batTable"></table>
</div>

<div class="section">
<h3>Bowling</h3>
<table id="bowlTable"></table>
</div>

<div class="section">
<h3>Run Progression</h3>
<div id="wormChart"></div>
</div>

</div>
</div>

<script>

/* API HELPER */

const API="https://cricbuzz.namanmehra.workers.dev"

async function api(endpoint){
const res=await fetch(`${API}?endpoint=${encodeURIComponent(endpoint)}`)
return await res.json()
}


/* LOAD MATCHES */

async function loadMatches(type){

const data=await api(`/matches/v1/${type}`)

const container=document.getElementById("matches")
container.innerHTML=""

data.typeMatches.forEach(type=>{
type.seriesMatches.forEach(series=>{

if(series.seriesAdWrapper && series.seriesAdWrapper.matches){

series.seriesAdWrapper.matches.forEach(match=>{

const info=match.matchInfo

const card=document.createElement("div")
card.className="match"

card.innerHTML=`
<b>${info.team1.teamName} vs ${info.team2.teamName}</b><br>
${info.status}
`

card.onclick=()=>loadMatch(info.matchId)

container.appendChild(card)

})

}

})
})

}


/* LOAD MATCH */

async function loadMatch(matchId){

const header=await api(`/mcenter/v1/${matchId}`)
const score=await api(`/mcenter/v1/${matchId}/hscard`)
const overs=await api(`/mcenter/v1/${matchId}/overs`)

renderHeader(header)
renderBatting(score)
renderBowling(score)
renderOvers(overs)

}


/* HEADER */

function renderHeader(data){

const title=document.getElementById("matchTitle")

title.innerHTML=`
${data.matchHeader.team1.name} vs ${data.matchHeader.team2.name}
<br>
<small>${data.matchHeader.status}</small>
`

}


/* BATTING */

function renderBatting(data){

const table=document.getElementById("batTable")

table.innerHTML="<tr><th>Player</th><th>Runs</th><th>Balls</th><th>4s</th><th>6s</th></tr>"

Object.values(data.scoreCard[0].batTeamDetails.batsmenData).forEach(b=>{

table.innerHTML+=`
<tr>
<td>${b.batName}</td>
<td>${b.runs}</td>
<td>${b.balls}</td>
<td>${b.fours}</td>
<td>${b.sixes}</td>
</tr>
`

})

}


/* BOWLING */

function renderBowling(data){

const table=document.getElementById("bowlTable")

table.innerHTML="<tr><th>Bowler</th><th>Overs</th><th>Runs</th><th>Wickets</th></tr>"

Object.values(data.scoreCard[0].bowlTeamDetails.bowlersData).forEach(b=>{

table.innerHTML+=`
<tr>
<td>${b.bowlName}</td>
<td>${b.overs}</td>
<td>${b.runs}</td>
<td>${b.wickets}</td>
</tr>
`

})

}


/* OVERS PROGRESSION */

function renderOvers(data){

if(!data.overSummary) return

let runs=[]
let total=0

data.overSummary.forEach(o=>{
total+=o.runs
runs.push(total)
})

Plotly.newPlot("wormChart",[{
y:runs,
mode:"lines",
type:"scatter"
}])

}


/* INITIAL LOAD */

loadMatches("live")

</script>

</body>
</html>
