<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricbuzz Live Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a9e5c; --green-dark: #117a44; --green-light: #e6f7ef;
    --red: #d63b3b; --amber: #e8a020;
    --text: #1a1a1a; --muted: #666; --border: #e2e2e2; --bg: #f7f7f5; --white: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: #0a2e1a; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #fff; }
  .nav-logo span { color: var(--green); }
  .nav-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.6); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
  .dot.live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
  .api-bar { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .api-bar label { font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
  .api-bar input { flex: 1; min-width: 200px; font-size: 12px; font-family: monospace; border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; background: var(--bg); color: var(--text); }
  .api-bar input:focus { outline: 2px solid var(--green); border-color: transparent; }
  .btn { padding: 8px 16px; border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .quota-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .q-ok { background: var(--green-light); color: var(--green-dark); }
  .q-err { background: #fdeaea; color: var(--red); }
  .q-unk { background: #f0f0ec; color: var(--muted); }
  .notice { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; line-height: 1.5; }
  .n-ok { background: var(--green-light); border: 1px solid #a3dfc3; color: var(--green-dark); }
  .n-err { background: #fdeaea; border: 1px solid #f0aaaa; color: var(--red); }
  .n-warn { background: #fff5e0; border: 1px solid #f5c842; color: #7a5200; }
  .tabs { display: flex; gap: 4px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 5px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 8px 10px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); font-family: 'Barlow', sans-serif; transition: all 0.15s; }
  .tab.active { background: var(--green); color: #fff; }
  .tab:hover:not(.active) { background: var(--bg); color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }
  .loader { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty h3 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .live-ind { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--red); font-weight: 500; }
  .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
  .match-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; }
  .match-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .mc-head { background: #0a2e1a; padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; }
  .mc-type { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; }
  .mc-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .b-live { background: var(--red); color: #fff; }
  .b-up { background: var(--amber); color: #fff; }
  .b-done { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.65); }
  .mc-body { padding: 14px; }
  .teams-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .team-blk { flex: 1; }
  .team-blk.r { text-align: right; }
  .t-name { font-family: 'Barlow Condensed', sans-serif; font-size: 21px; font-weight: 700; }
  .t-score { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--green); margin-top: 2px; }
  .t-score.dim { color: #bbb; }
  .vs-div { font-size: 12px; color: var(--muted); padding: 0 8px; flex-shrink: 0; }
  .mc-info { font-size: 12px; color: var(--muted); padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.5; }
  .mc-info strong { color: var(--green-dark); }
  .view-btn { margin-top: 10px; width: 100%; padding: 8px; background: var(--green-light); color: var(--green-dark); border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Barlow', sans-serif; }
  .view-btn:hover { background: #c4eedd; }
  .sc-back { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); cursor: pointer; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); font-family: 'Barlow', sans-serif; }
  .back-btn:hover { background: var(--bg); color: var(--text); }
  .sc-hero { background: #0a2e1a; border-radius: 12px; padding: 22px; margin-bottom: 16px; color: #fff; }
  .sc-series { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .sc-teams { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .sc-team h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; line-height: 1; }
  .sc-team .sm { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 600; color: var(--green); margin-top: 4px; }
  .sc-team .ov { font-size: 12px; color: rgba(255,255,255,0.4); }
  .sc-mid { text-align: center; }
  .sc-vs { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
  .crr-box { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .crr-box span { color: var(--green); font-weight: 700; }
  .sc-status { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; color: rgba(255,255,255,0.75); }
  .sc-status strong { color: #fff; }
  .inn-tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .inn-tab { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-family: 'Barlow', sans-serif; }
  .inn-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .card-hd { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); background: #fafaf8; display: flex; align-items: center; justify-content: space-between; }
  .card-hd .tot { font-size: 16px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--text); text-transform: none; letter-spacing: 0; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 8px 12px; text-align: right; background: #fafaf8; border-bottom: 1px solid var(--border); }
  th:first-child { text-align: left; }
  td { font-size: 13px; padding: 10px 12px; text-align: right; border-bottom: 1px solid #f0f0ec; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr.notout td { background: #f2fbf6; }
  .pname { font-weight: 500; }
  .phow { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .out-name { color: var(--muted); }
  .no-name { color: var(--green-dark); font-weight: 600; }
  .num { font-weight: 600; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; }
  .cg { color: var(--green-dark); }
  .cr { color: var(--red); }
  .extras-row { padding: 8px 12px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); background: #fafaf8; }
  .p-section { padding: 10px 14px; }
  .p-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f0f0ec; font-size: 12px; }
  .p-row:last-child { border-bottom: none; }
  .p-names { flex: 0 0 140px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-bar-wrap { flex: 1; }
  .p-bar { height: 5px; background: var(--green-light); border-radius: 3px; }
  .p-bar-fill { height: 100%; background: var(--green); border-radius: 3px; }
  .p-runs { font-weight: 600; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; width: 65px; text-align: right; flex-shrink: 0; }
  .rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #f0f0ec; }
  .rank-row:last-child { border-bottom: none; }
  .rk-num { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
  .rk-num.top { color: var(--amber); }
  .rk-info { flex: 1; }
  .rk-name { font-weight: 500; font-size: 14px; }
  .rk-country { font-size: 12px; color: var(--muted); }
  .rk-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--green-dark); }
  .delta { font-size: 11px; }
  .du { color: var(--green); } .dd { color: var(--red); } .ds { color: var(--muted); }
  .fmt-tab { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-family: 'Barlow', sans-serif; }
  .fmt-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
  .search-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-row input { flex: 1; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; background: var(--white); color: var(--text); font-family: 'Barlow', sans-serif; }
  .search-row input:focus { outline: 2px solid var(--green); border-color: transparent; }
  @media(max-width:600px){ .matches-grid{grid-template-columns:1fr} .sc-team h2{font-size:22px} }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">CRIC<span>BUZZ</span> LIVE</div>
  <div class="nav-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</nav>
<div class="container">
  <div class="api-bar">
    <label>API KEY</label>
    <input type="text" id="apiKey" value="6d53928bfdmsh545332aded830a3p11bdaajsncf079fc57095" />
    <button class="btn btn-primary" onclick="connectAndLoad()">Connect</button>
    <span class="quota-pill q-unk" id="qPill">Not checked</span>
  </div>
  <div id="noticeArea"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('live',this)">Live</button>
    <button class="tab" onclick="switchTab('recent',this)">Recent</button>
    <button class="tab" onclick="switchTab('upcoming',this)">Upcoming</button>
    <button class="tab" onclick="switchTab('rankings',this)">Rankings</button>
    <button class="tab" onclick="switchTab('search',this)">Player</button>
  </div>
  <div class="panel active" id="panel-live"><div class="loader"><div class="spinner"></div><p>Press Connect to load</p></div></div>
  <div class="panel" id="panel-recent"><div class="loader"><div class="spinner"></div><p>Press Connect to load</p></div></div>
  <div class="panel" id="panel-upcoming"><div class="loader"><div class="spinner"></div><p>Press Connect to load</p></div></div>
  <div class="panel" id="panel-rankings"><div class="loader"><div class="spinner"></div><p>Press Connect to load</p></div></div>
  <div class="panel" id="panel-search">
    <div class="search-row">
      <input type="text" id="playerQ" placeholder="Search player (e.g. Kohli, Bumrah, Root...)" onkeydown="if(event.key==='Enter')searchPlayer()" />
      <button class="btn btn-primary" onclick="searchPlayer()">Search</button>
    </div>
    <div id="search-results"><div class="empty"><div class="empty-icon">🏏</div><h3>Search for a player</h3></div></div>
  </div>
</div>
<script>
const HOST='cricbuzz-cricket.p.rapidapi.com', BASE='https://cricbuzz-cricket.p.rapidapi.com';
let currentTab='live', loaded={}, rankFormat='test', rankType='batsmen';

const key=()=>document.getElementById('apiKey').value.trim();
const setStatus=(live,txt)=>{document.getElementById('statusDot').className='dot'+(live?' live':'');document.getElementById('statusText').textContent=txt;};
const setQuota=(cls,txt)=>{const e=document.getElementById('qPill');e.className='quota-pill '+cls;e.textContent=txt;};
const notice=(t,h)=>{document.getElementById('noticeArea').innerHTML=`<div class="notice n-${t}">${h}</div>`;};
const clearNotice=()=>{document.getElementById('noticeArea').innerHTML='';};
const errHTML=msg=>`<div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p style="font-size:13px">${msg}</p></div>`;

async function api(path){
  const r=await fetch(BASE+path,{headers:{'x-rapidapi-host':HOST,'x-rapidapi-key':key(),'Content-Type':'application/json'}});
  const d=await r.json();
  if(d.message?.includes('exceeded'))throw Object.assign(new Error('QUOTA'),{code:'QUOTA'});
  if(d.message?.includes('subscribed')||d.message?.includes('Invalid'))throw Object.assign(new Error(d.message),{code:'AUTH'});
  return d;
}

async function connectAndLoad(){
  clearNotice(); loaded={};
  setStatus(false,'Connecting...'); setQuota('q-unk','Checking...');
  try{
    await api('/matches/v1/live');
    setStatus(true,'Live'); setQuota('q-ok','✓ Connected');
    notice('ok','✅ API connected. Loading data...');
    loadTab(currentTab);
  }catch(e){
    if(e.code==='QUOTA'){setStatus(false,'Quota exceeded');setQuota('q-err','Quota exceeded');notice('warn','⚠️ Monthly quota exhausted. <a href="https://rapidapi.com/cricketapilive/api/cricbuzz-cricket" target="_blank" style="color:inherit;font-weight:600">Upgrade ↗</a>');}
    else{setStatus(false,'Error');setQuota('q-err','Error');notice('err','❌ '+e.message);}
  }
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+tab).classList.add('active');
  currentTab=tab;
  if(!loaded[tab]&&document.getElementById('qPill').classList.contains('q-ok')) loadTab(tab);
}

function loadTab(tab){ loaded[tab]=true; if(tab==='rankings') loadRankings(); else if(tab!=='search') loadMatches(tab); }

// MATCHES
async function loadMatches(type){
  const cont=document.getElementById('panel-'+type);
  cont.innerHTML='<div class="loader"><div class="spinner"></div><p>Loading...</p></div>';
  try{ renderMatches(parseMatches(await api('/matches/v1/'+type)),type,cont); }
  catch(e){ cont.innerHTML=errHTML(e.message); }
}

function parseMatches(data){
  const out=[];
  (data.typeMatches||[]).forEach(tm=>{
    (tm.seriesMatches||[]).forEach(sm=>{
      const saw=sm.seriesAdWrapper; if(!saw) return;
      (saw.matches||[]).forEach(m=>{
        const mi=m.matchInfo||{}, ms=m.matchScore||{};
        const i1=ms.team1Score?.inngs1, i2=ms.team2Score?.inngs1;
        const state=mi.state||'';
        out.push({
          matchId:mi.matchId, format:mi.matchFormat||'—', series:saw.seriesName||'',
          status: state==='In Progress'||state==='Toss'?'live':state==='Complete'?'done':'upcoming',
          t1:mi.team1?.teamSName||'?', t2:mi.team2?.teamSName||'?',
          s1:i1?`${i1.runs}/${i1.wickets} (${i1.overs})`:null,
          s2:i2?`${i2.runs}/${i2.wickets} (${i2.overs})`:null,
          info:mi.status||'', venue:mi.venueInfo?`${mi.venueInfo.ground}, ${mi.venueInfo.city}`:''
        });
      });
    });
  });
  return out;
}

function renderMatches(matches,type,cont){
  if(!matches.length){cont.innerHTML=`<div class="empty"><div class="empty-icon">🏏</div><h3>No ${type} matches right now</h3></div>`;return;}
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  let h=`<div class="top-bar"><span class="section-label">${matches.length} match${matches.length>1?'es':''}</span>${type==='live'?`<span class="live-ind"><span class="dot live"></span> LIVE · ${now}</span>`:''}</div><div class="matches-grid">`;
  matches.forEach(m=>{
    const bc=m.status==='live'?'b-live':m.status==='upcoming'?'b-up':'b-done';
    const bt=m.status==='live'?'🔴 Live':m.status==='upcoming'?'⏰ Soon':'✓ Result';
    const seriesShort=m.series.length>34?m.series.substring(0,34)+'…':m.series;
    h+=`<div class="match-card" onclick="openScorecard(${m.matchId},'${m.t1}','${m.t2}','${m.series.replace(/'/g,"\\'")}')">
      <div class="mc-head"><span class="mc-type">${m.format} · ${seriesShort}</span><span class="mc-badge ${bc}">${bt}</span></div>
      <div class="mc-body">
        <div class="teams-row">
          <div class="team-blk"><div class="t-name">${m.t1}</div><div class="t-score ${m.s1?'':'dim'}">${m.s1||'—'}</div></div>
          <div class="vs-div">vs</div>
          <div class="team-blk r"><div class="t-name">${m.t2}</div><div class="t-score ${m.s2?'':'dim'}">${m.s2||'—'}</div></div>
        </div>
        <div class="mc-info">${m.info?`<strong>${m.info}</strong><br>`:''}${m.venue?`📍 ${m.venue}`:''}</div>
        <button class="view-btn">View Scorecard →</button>
      </div></div>`;
  });
  h+='</div>'; cont.innerHTML=h;
}

// SCORECARD
async function openScorecard(matchId,t1,t2,series){
  const cont=document.getElementById('panel-'+currentTab);
  cont.innerHTML='<div class="loader"><div class="spinner"></div><p>Loading scorecard...</p></div>';
  try{
    const [scData,miData]=await Promise.all([api(`/mcenter/v1/${matchId}/scard`),api(`/mcenter/v1/${matchId}`)]);
    renderScorecard(scData,miData,matchId,t1,t2,series);
  }catch(e){ cont.innerHTML=errHTML(e.message); }
}

function renderScorecard(scData,miData,matchId,t1Name,t2Name,seriesName){
  const cont=document.getElementById('panel-'+currentTab);
  const innings=scData.scorecard||[];
  const venue=miData.venueinfo?`${miData.venueinfo.ground}, ${miData.venueinfo.city}`:'';
  const status=miData.status||scData.status||'';
  const series=miData.seriesname||seriesName||'';
  const inn1=innings[0], inn2=innings[1];
  const sc1=inn1?`${inn1.score}/${inn1.wickets}`:'—', ov1=inn1?`(${inn1.overs} ov)`:'';
  const sc2=inn2?`${inn2.score}/${inn2.wickets}`:'—', ov2=inn2?`(${inn2.overs} ov)`:'';
  const t1sn=inn1?.batteamsname||t1Name, t2sn=inn2?.batteamsname||t2Name;
  const innTabs=innings.map((inn,i)=>`<button class="inn-tab ${i===0?'active':''}" onclick="showInn(${i})" id="itab${i}">${inn.batteamsname} ${i===0?'1st':'2nd'} Inn</button>`).join('');
  cont.innerHTML=`
    <div class="sc-back">
      <button class="back-btn" onclick="backToMatches()">← Back</button>
      <button class="btn btn-sm btn-outline" onclick="openScorecard(${matchId},'${t1Name}','${t2Name}','${seriesName.replace(/'/g,"\\'")}')">↻ Refresh</button>
    </div>
    <div class="sc-hero">
      <div class="sc-series">${series}${venue?' · '+venue:''}</div>
      <div class="sc-teams">
        <div class="sc-team"><h2>${t1sn}</h2><div class="sm">${sc1} <span class="ov">${ov1}</span></div></div>
        <div class="sc-mid"><div class="sc-vs">vs</div>${inn1?.runrate?`<div class="crr-box">RR <span>${parseFloat(inn1.runrate).toFixed(2)}</span></div>`:''}</div>
        <div class="sc-team" style="text-align:right"><h2>${t2sn}</h2><div class="sm">${sc2} <span class="ov">${ov2}</span></div></div>
      </div>
      <div class="sc-status"><strong>${status}</strong></div>
    </div>
    <div class="inn-tabs">${innTabs}</div>
    <div id="inn-body"></div>`;
  window._innings=innings; showInn(0);
}

window.showInn=function(idx){
  document.querySelectorAll('.inn-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const inn=(window._innings||[])[idx]; if(!inn) return;
  const batsmen=inn.batsman||[], bowlers=inn.bowler||[];
  const partnerships=(inn.partnership?.partnership)||[];
  const extras=inn.extras||{};
  const maxP=Math.max(...partnerships.map(p=>p.totalruns),1);

  let h=`<div class="card"><div class="card-hd">Batting <span class="tot">${inn.score}/${inn.wickets} (${inn.overs} ov) · RR ${parseFloat(inn.runrate||0).toFixed(2)}</span></div>
    <table><thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>`;
  batsmen.forEach(b=>{
    const notOut=!b.outdec||b.outdec==='';
    const sr=parseFloat(b.strkrate||0);
    const srCls=sr>=150?'cg':sr>0&&sr<100?'cr':'';
    const role=(b.iscaptain?'(c)':'')+(b.iskeeper?' †':'');
    h+=`<tr class="${notOut?'notout':''}">
      <td><div class="pname ${notOut?'no-name':'out-name'}">${b.name}${notOut?' *':''}${role?` <span style="font-size:11px;font-weight:400">${role}</span>`:''}</div>
          ${b.outdec?`<div class="phow">${b.outdec}</div>`:'<div class="phow" style="color:var(--green-dark)">not out</div>'}</td>
      <td class="num">${b.runs}</td><td>${b.balls}</td><td>${b.fours}</td><td>${b.sixes}</td>
      <td class="${srCls}">${sr.toFixed(1)}</td></tr>`;
  });
  h+='</tbody></table>';
  if(extras.total!=null) h+=`<div class="extras-row">Extras <strong>${extras.total}</strong> (w ${extras.wides||0}, nb ${extras.noballs||0}, lb ${extras.legbyes||0}, b ${extras.byes||0})</div>`;
  h+='</div>';

  if(partnerships.length){
    h+=`<div class="card"><div class="card-hd">Partnerships</div><div class="p-section">`;
    partnerships.forEach(p=>{
      const pct=Math.round((p.totalruns/maxP)*100);
      h+=`<div class="p-row"><div class="p-names">${p.bat1name} & ${p.bat2name}</div>
        <div class="p-bar-wrap"><div class="p-bar"><div class="p-bar-fill" style="width:${pct}%"></div></div></div>
        <div class="p-runs">${p.totalruns} <span style="font-size:11px;font-weight:400;color:#999">(${p.totalballs}b)</span></div></div>`;
    });
    h+='</div></div>';
  }

  h+=`<div class="card"><div class="card-hd">Bowling</div>
    <table><thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>ECO</th></tr></thead><tbody>`;
  bowlers.forEach(b=>{
    const eco=parseFloat(b.economy||0);
    h+=`<tr><td class="pname">${b.name}${b.iscaptain?' (c)':''}${b.iskeeper?' †':''}</td>
      <td>${b.overs}</td><td>${b.maidens}</td><td>${b.runs}</td>
      <td class="num ${b.wickets>0?'cg':''}">${b.wickets}</td>
      <td class="${eco<=7?'cg':eco>=10?'cr':''}">${eco.toFixed(2)}</td></tr>`;
  });
  h+='</tbody></table></div>';
  document.getElementById('inn-body').innerHTML=h;
};

function backToMatches(){ loaded[currentTab]=false; loadMatches(currentTab); }

// RANKINGS
async function loadRankings(){
  const cont=document.getElementById('panel-rankings');
  cont.innerHTML='<div class="loader"><div class="spinner"></div><p>Loading...</p></div>';
  try{ renderRankings(await api(`/stats/v1/rankings/${rankType}?formatType=${rankFormat}`),cont); }
  catch(e){ cont.innerHTML=errHTML(e.message); }
}
function renderRankings(data,cont){
  const ranks=(data.rank||[]).slice(0,15);
  let h=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    ${['batsmen','bowlers','allrounders'].map(t=>`<button class="fmt-tab ${rankType===t?'active':''}" onclick="rankType='${t}';loadRankings()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
  </div><div style="display:flex;gap:6px;margin-bottom:14px">
    ${['test','odi','t20i'].map(f=>`<button class="fmt-tab ${rankFormat===f?'active':''}" onclick="rankFormat='${f}';loadRankings()">${f.toUpperCase()}</button>`).join('')}
  </div><div class="card"><div class="card-hd">ICC ${rankFormat.toUpperCase()} ${rankType} Rankings</div>`;
  if(!ranks.length){h+='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No data</div>';}
  else ranks.forEach(r=>{
    const trend=r.trend==='UP'?'<span class="delta du">▲</span>':r.trend==='DOWN'?'<span class="delta dd">▼</span>':'<span class="delta ds">—</span>';
    h+=`<div class="rank-row"><div class="rk-num ${parseInt(r.rank)<=3?'top':''}">${r.rank}</div>
      <div class="rk-info"><div class="rk-name">${r.name}</div><div class="rk-country">${r.country}</div></div>
      ${trend}<div class="rk-pts">${r.rating}</div></div>`;
  });
  h+='</div>'; cont.innerHTML=h;
}

// PLAYER SEARCH
async function searchPlayer(){
  const q=document.getElementById('playerQ').value.trim(); if(!q) return;
  const cont=document.getElementById('search-results');
  cont.innerHTML='<div class="loader"><div class="spinner"></div><p>Searching...</p></div>';
  try{
    const data=await api(`/stats/v1/player/search?plrN=${encodeURIComponent(q)}`);
    const players=data.player||[];
    if(!players.length){cont.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>No players found</h3></div>';return;}
    let h=`<div class="card"><div class="card-hd">Results for "${q}"</div>`;
    players.slice(0,10).forEach(p=>{
      h+=`<div class="rank-row" style="cursor:pointer" onclick="loadPlayerCareer(${p.id},'${(p.name||'').replace(/'/g,"\\'")}')">
        <div class="rk-info"><div class="rk-name">${p.name}</div><div class="rk-country">${p.teamName||''}</div></div>
        <span style="font-size:12px;color:var(--green-dark);font-weight:500">Career →</span></div>`;
    });
    h+='</div>'; cont.innerHTML=h;
  }catch(e){cont.innerHTML=errHTML(e.message);}
}

async function loadPlayerCareer(id,name){
  const cont=document.getElementById('search-results');
  cont.innerHTML='<div class="loader"><div class="spinner"></div><p>Loading...</p></div>';
  try{
    const data=await api(`/stats/v1/player/${id}/career`);
    const hdrs=data.headers||[], vals=data.values||[];
    let h=`<button class="back-btn" style="margin-bottom:12px" onclick="document.getElementById('search-results').innerHTML='<div class=empty><div class=empty-icon>🏏</div><h3>Search for a player</h3></div>'">← Back</button>
      <div class="card"><div class="card-hd">${name}</div>`;
    if(!hdrs.length){h+='<div style="padding:16px;font-size:13px;color:var(--muted)">No career data available</div>';}
    else{
      h+='<div style="overflow-x:auto"><table><thead><tr>';
      hdrs.forEach(hd=>{h+=`<th>${hd}</th>`;});
      h+='</tr></thead><tbody>';
      vals.forEach(row=>{
        h+='<tr>';
        Object.values(row).forEach((v,i)=>{h+=`<td ${i===0?'style="text-align:left;font-weight:500"':''}>${v}</td>`;});
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div>'; cont.innerHTML=h;
  }catch(e){cont.innerHTML=errHTML(e.message);}
}

window.onload=()=>connectAndLoad();
</script>
